<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Health</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <div>
        <h1>Plant Health</h1>
        <p>Grow cute plants, water them, and watch their mood change over time.</p>

      </div>
    </header>



    <section>
      <h2>Your plants</h2>
      <div id="plant-list" class="plant-list"></div>
    </section>

    <section class="add-plant-section">
      <div class="add-plant-card">
        <button class="add-plant-button" id="add-plant-btn">
          <span class="plus-icon">+</span>
        </button>
        <p>Add a plant</p>
      </div>
    </section>

    <dialog id="plant-modal" class="plant-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Create a new plant</h2>
          <button type="button" class="close-button" id="close-modal">&times;</button>
        </div>
        <form id="plant-form" class="modal-form">
          <div class="field-row">
            <label for="plant-name">Plant name</label>
            <input id="plant-name" type="text" placeholder="Sunny" required maxlength="20" />
          </div>
          <div class="field-row">
            <label for="water-interval">Water every</label>
            <div class="interval-inputs">
              <input id="water-interval-days" type="number" min="0" value="0" required />
              <span>days</span>
              <input id="water-interval" type="number" min="0" value="7" required />
              <span>hours</span>
            </div>
          </div>
          <div class="field-row">
            <label for="face-color">Face color</label>
            <div id="face-swatch" style="background-color: #b1e07c; width: 40px; height: 40px; border-radius: 4px;"></div>
            <input id="face-color" type="color" value="#b1e07c" />
          </div>


          <div class="field-row">
            <label for="face-style">Face style</label>
              <select id="face-style" name="face-style">
              <option value="smile" selected>Smiley (plant)</option>
              <option value="leaf">Leaf</option>
              </select>
          </div>
          <div class="field-row">
            <label for="bg-color">Background</label>
            <div id="bg-swatch" style="background-color: #f7f3d8; width: 40px; height: 40px; border-radius: 4px;"></div>
            <input id="bg-color" type="color" value="#f7f3d8" />
          </div>
          <button class="primary-button" type="submit">Add Plant</button>
        </form>
      </div>
    </dialog>
    <!-- Plant Detail Dialog -->
<dialog id="plant-detail-modal" class="plant-detail-modal">
  <div class="plant-detail-content" id="plant-detail-content">
    <!-- This will be populated dynamically -->
  </div>
</dialog>
  </div>

  <script src="script.js"></script>
</body>
</html>
